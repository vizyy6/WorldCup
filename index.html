<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كأس العالم 2026 — الجدول الكامل بتوقيت الرياض</title>
<meta name="description" content="جدول كأس العالم 2026 الكامل بتوقيت الرياض — كل المباريات والتواريخ والملاعب والنتائج المباشرة.">
<meta property="og:title" content="كأس العالم 2026 — الجدول الكامل بتوقيت الرياض">
<meta property="og:description" content="كل مباريات المونديال بتوقيت السعودية، مع النتائج المباشرة والأدوار الإقصائية.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="كأس العالم 2026">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  /* خط ثمانية (Thmanyah Sans) — مستضاف محلياً */
  @font-face{font-family:'Thmanyah';src:url('fonts/thmanyahsans-Light.woff2') format('woff2');font-weight:300;font-display:swap}
  @font-face{font-family:'Thmanyah';src:url('fonts/thmanyahsans-Regular.woff2') format('woff2');font-weight:400;font-display:swap}
  @font-face{font-family:'Thmanyah';src:url('fonts/thmanyahsans-Medium.woff2') format('woff2');font-weight:500;font-display:swap}
  @font-face{font-family:'Thmanyah';src:url('fonts/thmanyahsans-Bold.woff2') format('woff2');font-weight:700;font-display:swap}
  @font-face{font-family:'Thmanyah';src:url('fonts/thmanyahsans-Black.woff2') format('woff2');font-weight:800;font-display:swap}
  @font-face{font-family:'Thmanyah';src:url('fonts/thmanyahsans-Black.woff2') format('woff2');font-weight:900;font-display:swap}
  :root{
    --bg:#0a0e1a;--bg2:#0f1628;--card:#141d33;--card-hi:#1b2742;--line:#23304f;
    --txt:#eaf0ff;--mut:#8593b3;--accent:#00e0a4;--accent2:#ff3d7f;--gold:#ffcb45;
  }
  body{font-family:'Thmanyah',sans-serif;line-height:1.5;padding-bottom:60px;-webkit-tap-highlight-color:transparent;
    background:radial-gradient(1200px 600px at 80% -10%,rgba(0,224,164,.10),transparent 60%),
      radial-gradient(1000px 500px at 0% 0%,rgba(255,61,127,.08),transparent 55%),var(--bg);color:var(--txt)}
  .wrap{max-width:780px;margin:0 auto;padding:0 14px}
  header{padding:34px 14px 18px;text-align:center}
  .kick{font-size:13px;letter-spacing:3px;color:var(--accent);font-weight:700;margin-bottom:6px}
  h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(46px,12vw,82px);line-height:.92;letter-spacing:1px;direction:ltr;
    background:linear-gradient(120deg,#fff 10%,var(--accent) 50%,var(--accent2) 95%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .sub{color:var(--mut);font-size:15px;margin-top:8px}.sub b{color:var(--txt)}
  .host{margin-top:12px;font-size:22px;letter-spacing:6px}
  .by{margin-top:12px;font-size:13px;color:var(--mut);letter-spacing:1.5px;direction:ltr}
  .by span{color:var(--gold);font-weight:800}
  .status{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;font-size:13px;color:var(--mut)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--mut)}
  .dot.live{background:var(--accent);box-shadow:0 0 0 0 rgba(0,224,164,.5);animation:p 1.6s infinite}
  .dot.err{background:var(--accent2)}
  @keyframes p{0%{box-shadow:0 0 0 0 rgba(0,224,164,.5)}70%{box-shadow:0 0 0 8px rgba(0,224,164,0)}100%{box-shadow:0 0 0 0 rgba(0,224,164,0)}}
  .refresh{background:var(--card);border:1px solid var(--line);color:var(--mut);border-radius:20px;
    padding:5px 12px;font-family:'Thmanyah';font-weight:700;font-size:12px;cursor:pointer}
  .refresh:hover{color:var(--txt)}
  .filters{position:sticky;top:0;z-index:30;background:rgba(10,14,26,.86);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);padding:10px 0;margin-bottom:18px}
  .frow{display:flex;gap:8px;overflow-x:auto;padding:0 14px;scrollbar-width:none}.frow::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;background:var(--card);border:1px solid var(--line);color:var(--mut);padding:8px 15px;
    border-radius:30px;font-family:'Thmanyah';font-weight:700;font-size:14px;cursor:pointer;transition:.2s;white-space:nowrap}
  .chip:hover{color:var(--txt)}
  .chip.on{background:linear-gradient(120deg,var(--accent),#00b389);color:#04221a;border-color:transparent}
  .chip.ksaC{border-color:var(--gold);color:var(--gold)}
  .chip.ksaC.on{background:linear-gradient(120deg,var(--gold),#ffb000);color:#3a2600;border-color:var(--gold)}
  .daygroup{margin-bottom:26px}
  .dayhead{display:flex;align-items:baseline;gap:10px;padding:6px 4px 12px;border-bottom:1px solid var(--line);margin-bottom:14px}
  .dayhead.today{border-bottom-color:var(--accent)}
  .dayhead.today .dnum{color:var(--gold)}
  .todaybadge{margin-right:auto;background:linear-gradient(120deg,var(--accent),#00b389);color:#04221a;
    font-size:11px;font-weight:800;padding:3px 11px;border-radius:20px;align-self:center}
  .dnum{font-family:'Bebas Neue';font-size:34px;color:var(--accent);line-height:1;direction:ltr}
  .dwords{font-weight:800;font-size:17px}.ddow{color:var(--mut);font-size:14px;font-weight:500}
  .match{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:10px;
    display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;transition:.18s;position:relative;overflow:hidden}
  .match:hover{background:var(--card-hi);transform:translateY(-2px)}
  /* زر المشاركة */
  .shareic{position:absolute;top:8px;left:8px;z-index:5;width:28px;height:28px;border-radius:9px;
    background:var(--bg2);border:1px solid var(--line);color:var(--mut);cursor:pointer;
    display:flex;align-items:center;justify-content:center;padding:0;transition:.18s}
  .shareic:hover{color:var(--accent);border-color:var(--accent);background:rgba(0,224,164,.08)}
  .shareic.copied{color:var(--accent);border-color:var(--accent)}
  .match.ksaM .shareic{left:auto;right:8px}
  /* بطاقات المباراة */
  .cardszone{grid-column:1/-1;display:flex;justify-content:center;align-items:flex-start;gap:0;margin:10px 0 2px;padding-top:10px;border-top:1px solid var(--line)}
  .cardcol{display:flex;flex-direction:column;align-items:center;gap:7px;flex:1;max-width:160px}
  .ccard{position:relative;width:28px;height:39px;border-radius:5px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(0,0,0,.45);transform:rotate(-7deg)}
  .ccard.yellow{background:linear-gradient(150deg,#ffd23f,#f5b800)}
  .ccard.red{background:linear-gradient(150deg,#ff4757,#e01e37);transform:rotate(7deg)}
  .ccard .cnum{font-family:'Bebas Neue';font-size:20px;font-weight:700;color:rgba(0,0,0,.78);line-height:1}
  .ccard.red .cnum{color:rgba(255,255,255,.95)}
  .cneon{width:2px;align-self:stretch;margin:2px 14px;border-radius:2px;background:var(--accent);box-shadow:0 0 6px rgba(0,224,164,.6)}
  .cnames{display:flex;flex-direction:column;gap:5px;width:100%;margin-top:2px;min-width:0}
  .cpname{display:flex;align-items:center;justify-content:center;gap:5px;font-size:11px;color:var(--txt);background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:8px;padding:3px 6px;min-width:0}
  .cpname>span:nth-child(2){overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
  .cpname .cfl{flex:0 0 auto;font-size:12px}
  .cpname .cmn{flex:0 0 auto;color:var(--mut);font-size:10px;font-family:'Bebas Neue'}
  .match.ksaM{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset,0 6px 24px rgba(255,203,69,.10)}
  .match.ksaM::before{content:attr(data-arab);position:absolute;top:0;left:0;background:var(--gold);color:#3a2600;
    font-size:11px;font-weight:800;padding:3px 10px;border-bottom-right-radius:10px}
  .teams{display:flex;flex-direction:column;gap:7px;padding-top:2px}.match.ksaM .teams{padding-top:20px}.match.ksaM .meta{padding-top:20px}
  .team{display:flex;align-items:center;gap:9px;font-weight:700;font-size:16px}
  .team .sc{margin-right:auto;font-family:'Bebas Neue';font-size:30px;color:var(--accent);direction:ltr;min-width:24px;text-align:center}
  .team.win .sc{color:var(--gold)}
  @media (max-width:520px){
    .match{grid-template-columns:1fr;gap:8px}
    .teams{padding-left:36px}
    .meta{flex-direction:row;flex-wrap:wrap;align-items:center;justify-content:flex-end;gap:6px 10px;min-width:0;border-top:1px solid var(--line);padding-top:8px}
    .match.ksaM .meta{padding-top:8px}
    .time{font-size:24px}
    .stad{order:2}.city{order:3}.tag{order:4}
    .ccard{width:26px;height:36px}.ccard .cnum{font-size:18px}
    .cardcol{max-width:46%}
    .cneon{margin:2px 10px}
  }
  .flag{font-size:22px;line-height:1;width:26px;text-align:center;flex:0 0 auto}
  .tlogo{width:24px;height:24px;object-fit:contain;vertical-align:middle;display:inline-block}
  .grptbl .tlogo{width:18px;height:18px}
  .bflag .tlogo{width:16px;height:16px}
  .gflag .tlogo{width:15px;height:15px}
  .bclogo{width:18px;height:18px;object-fit:contain;vertical-align:middle;display:inline-block}
  /* علامة الخروج */
  .tn.out{text-decoration:line-through;text-decoration-color:var(--accent2);text-decoration-thickness:2px;opacity:.62}
  .outtag{display:inline-block;font-size:9px;font-weight:800;color:#fff;background:var(--accent2);border-radius:5px;padding:1px 6px;margin:0 5px;vertical-align:middle;letter-spacing:.3px;box-shadow:0 1px 3px rgba(255,61,127,.4)}
  .outtag.sm{font-size:8px;padding:0 4px;margin:0 3px}
  .team.isout{opacity:.92}
  .grptbl tr.isout td.tm{opacity:.95}
  .bteam.isout{opacity:.9}
  .vs{color:var(--mut);font-size:12px;font-weight:500;padding-right:35px}
  .meta{text-align:left;direction:ltr;display:flex;flex-direction:column;align-items:flex-end;gap:4px;min-width:108px}
  .time{font-family:'Bebas Neue';font-size:30px;color:var(--txt);line-height:.9;letter-spacing:1px}
  .ampm{font-size:13px;color:var(--accent);font-family:'Thmanyah';font-weight:700}
  .ft{font-size:11px;font-weight:800;color:var(--accent2);background:rgba(255,61,127,.12);border:1px solid rgba(255,61,127,.3);padding:2px 8px;border-radius:6px}
  .stad{color:var(--txt);font-size:12.5px;font-weight:700;direction:rtl;text-align:left;line-height:1.25}
  .city{color:var(--mut);font-size:12px;direction:rtl;text-align:left}
  .livep{font-size:11px;font-weight:800;color:#1fe3aa;background:rgba(0,224,164,.14);border:1px solid rgba(0,224,164,.45);padding:2px 9px;border-radius:6px}
  .ns{font-size:10px;font-weight:700;color:var(--mut)}
  .prob{grid-column:1/-1;margin-top:10px}
  .pbar{display:flex;height:7px;border-radius:5px;overflow:hidden;background:var(--line)}
  .pbar .pa{background:var(--accent)}.pbar .pb{background:#5b6fb0}
  .plabels{display:flex;justify-content:space-between;align-items:center;margin-top:5px;font-size:11px;color:var(--mut)}
  .plabels .va{color:var(--accent);font-weight:800;direction:ltr;display:flex;align-items:center;gap:5px}
  .plabels .vb{color:#9fb0e6;font-weight:800;direction:ltr;display:flex;align-items:center;gap:5px}
  .plabels .pf{font-size:15px}
  .plabels .toq{font-size:9.5px;color:var(--mut)}
  .goals{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr;gap:4px 14px;margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)}
  .gcol{display:flex;flex-direction:column;gap:4px;min-width:0}
  .grow{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--txt)}
  .grow.a{justify-content:flex-start;direction:ltr;text-align:left}
  .gflag{font-size:15px;flex:0 0 auto;line-height:1}
  .gname{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .gmin{color:var(--accent);font-weight:800;font-size:11.5px;direction:ltr;flex:0 0 auto}
  .grow.a .gmin{color:#9fb0e6}
  .gmorewrap{display:flex;flex-direction:column;gap:4px}
  .gmore{background:none;border:1px solid var(--line);color:var(--mut);border-radius:8px;padding:3px 10px;font-family:'Thmanyah';font-weight:700;font-size:11px;cursor:pointer;align-self:flex-start;margin-top:2px}
  .gmore:hover{color:var(--txt)}
  .statsbtn{grid-column:1/-1;margin-top:10px;background:var(--bg2);border:1px solid var(--line);color:var(--mut);
    border-radius:9px;padding:6px 12px;font-family:'Thmanyah';font-weight:700;font-size:12px;cursor:pointer;width:100%}
  .statsbtn:hover{color:var(--txt)}
  .lineupbtn{grid-column:1/-1;margin-top:8px;background:var(--bg2);border:1px solid var(--line);color:var(--mut);
    border-radius:9px;padding:6px 12px;font-family:'Thmanyah';font-weight:700;font-size:12px;cursor:pointer;width:100%}
  .lineupbtn:hover{color:var(--txt)}
  /* لوحة التشكيلة */
  .luoverlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:999;overflow:auto;padding:16px;display:flex;align-items:flex-start;justify-content:center}
  .lubox{max-width:480px;width:100%;background:var(--bg);border:1px solid var(--line);border-radius:16px;padding:14px;margin:auto}
  .luclose{background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:20px;padding:6px 14px;font-family:'Thmanyah';font-weight:700;font-size:13px;cursor:pointer;margin-bottom:12px}
  .lu-head{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin-bottom:10px}
  .lu-side{display:flex;flex-direction:column;gap:2px}.lu-side.away{text-align:left}
  .lu-team{font-weight:800;font-size:15px}.lu-form{font-size:12px;color:var(--accent);font-weight:700;direction:ltr}.lu-coach{font-size:11px;color:var(--mut)}
  .pitch{position:relative;width:100%;aspect-ratio:58/126;border-radius:16px;overflow:hidden;margin:8px 0;
    background:repeating-linear-gradient(0deg,#0d3b2e 0 9.09%,#0f4636 9.09% 18.18%);border:2px solid rgba(255,255,255,.25);box-shadow:0 8px 30px rgba(0,0,0,.5)}
  .pitch .midline{position:absolute;top:50%;left:0;right:0;height:2px;background:rgba(255,255,255,.4)}
  .pitch .circle{position:absolute;top:50%;left:50%;width:21%;aspect-ratio:1;border:2px solid rgba(255,255,255,.4);border-radius:50%;transform:translate(-50%,-50%)}
  .pitch .spot{position:absolute;top:50%;left:50%;width:5px;height:5px;background:rgba(255,255,255,.6);border-radius:50%;transform:translate(-50%,-50%)}
  .pitch .box{position:absolute;left:50%;transform:translateX(-50%);width:44%;height:14%;border:2px solid rgba(255,255,255,.35)}
  .pitch .box.top{top:0;border-top:none}.pitch .box.bot{bottom:0;border-bottom:none}
  .pitch .box6{position:absolute;left:50%;transform:translateX(-50%);width:22%;height:6%;border:2px solid rgba(255,255,255,.3)}
  .pitch .box6.top{top:0;border-top:none}.pitch .box6.bot{bottom:0;border-bottom:none}
  .pitch .goal{position:absolute;left:50%;transform:translateX(-50%);width:14%;height:1.5%;background:rgba(255,255,255,.5)}
  .pitch .goal.top{top:0}.pitch .goal.bot{bottom:0}
  .pl{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:3px;width:74px;z-index:2}
  .pl .shirt{position:relative;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:'Bebas Neue';font-size:16px;font-weight:700;border:2px solid rgba(255,255,255,.85);box-shadow:0 2px 6px rgba(0,0,0,.4)}
  .pl .shirt .flagbadge{position:absolute;top:-4px;right:-4px;font-size:11px;line-height:1;filter:drop-shadow(0 1px 1px rgba(0,0,0,.5))}
  .pl.home .shirt{background:var(--accent);color:#04221a}.pl.away .shirt{background:#e0356f;color:#fff}
  .pl .nm{font-size:8.5px;font-weight:700;text-align:center;background:rgba(0,0,0,.72);padding:2px 5px;border-radius:6px;line-height:1.05;white-space:normal;word-break:break-word;max-width:70px;letter-spacing:-.2px}
  .bench{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:9px 12px;margin:8px 0}
  .bench h4{font-size:12px;color:var(--mut);margin-bottom:7px}.bench.home h4{color:var(--accent)}.bench.away h4{color:#e0356f}
  .bench .subrow{display:flex;flex-wrap:wrap;gap:6px}
  .bench .subchip{font-size:11px;background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:3px 9px;color:var(--mut)}
  .bench .subchip b{color:var(--txt)}
  .bench .subchip.camein{border-color:var(--accent);color:var(--txt)}
  .bench .subchip .arr.in{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;background:var(--accent);color:#04221a;border:1.5px solid #fff;font-size:10px;font-weight:900;line-height:1;margin-left:2px;box-shadow:0 1px 2px rgba(0,0,0,.4)}
  .pl .subout{position:absolute;top:-5px;left:-5px;width:15px;height:15px;border-radius:50%;background:#ff3d5a;color:#fff;border:1.5px solid #fff;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;line-height:1;box-shadow:0 1px 3px rgba(0,0,0,.5)}
  .statspanel{grid-column:1/-1;margin-top:8px;padding-top:10px;border-top:1px dashed var(--line)}
  .statspanel .sthead{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--line);direction:ltr}
  .statspanel .sthteam{font-size:12px;font-weight:800;color:var(--txt)}
  .statspanel .stlbl{text-align:center;font-size:11px;color:var(--mut);font-weight:700;margin:6px 0 3px}
  .statspanel .strow{display:flex;align-items:center;gap:8px;direction:ltr}
  .statspanel .stv{font-size:12.5px;font-weight:800;color:var(--txt);min-width:34px;text-align:center}
  .statspanel .stv.vh{color:var(--accent)}
  .statspanel .stv.va{color:#38bdf8}
  .statspanel .stbarwrap{flex:1;height:6px;background:var(--line);border-radius:4px;overflow:hidden;direction:ltr;display:flex}
  .statspanel .stbar.sth{background:var(--accent);height:100%}
  .statspanel .stbar.sta{background:#38bdf8;height:100%}
  .tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;background:var(--bg2);color:var(--mut);border:1px solid var(--line)}
  .tag.g{color:var(--accent)}.tag.k{color:var(--accent2);border-color:rgba(255,61,127,.3)}.tag.f{color:var(--gold);border-color:rgba(255,203,69,.4)}
  .leg{color:var(--mut);font-size:12.5px;margin:0 4px 16px;display:flex;align-items:center;gap:8px}
  .leg .dotg{width:11px;height:11px;border-radius:3px;background:rgba(0,224,164,.45);border:1px solid var(--accent);flex:0 0 auto}
  .grpgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:12px}
  .grpcard{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .grphd{background:var(--bg2);padding:10px 14px;font-weight:800;color:var(--accent);border-bottom:1px solid var(--line)}
  .grptbl{width:100%;border-collapse:collapse;font-size:14px}
  .grptbl th{color:var(--mut);font-weight:700;font-size:11px;padding:8px 4px;text-align:center}
  .grptbl th:nth-child(2){text-align:right;padding-right:12px}
  .grptbl td{padding:9px 4px;text-align:center;border-top:1px solid var(--line)}

};

function norm(s){return (s||"").toString().trim().toLowerCase().replace(/\s+/g,' ');}
// المنتخبات العربية الثمانية في مونديال 2026 (بصيغة t1raw/t2raw المُطبّعة)
const ARAB_TEAMS=new Set(['saudi arabia','qatar','jordan','iraq','morocco','tunisia','algeria','egypt']);
function isArab(raw){return ARAB_TEAMS.has(norm(raw));}
function matchHasArab(m){return isArab(m.t1raw)||isArab(m.t2raw);}
function arName(en){const k=norm(en);if(NAME[k])return NAME[k];
  // ترجمة خفيفة لعناصر الأدوار الإقصائية
  let t=en.replace(/Winner Match/gi,'فائز م').replace(/Winner/gi,'فائز').replace(/Runners?-?up/gi,'وصيف')
        .replace(/Group/gi,'المجموعة').replace(/Match/gi,'م').replace(/3rd|Third/gi,'ثالث')
        .replace(/place/gi,'').replace(/\bvs\b/gi,'×');
  return [t,"🏳️"];}
function arCity(g){const k=norm(g);for(const[en,ar]of CITY)if(k.includes(en))return ar;return g||"";}

const MON=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
const DOW=["الأحد","الإثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];

/* يحوّل تاريخ+وقت openfootball (مثل 2026-06-11 و "13:00 UTC-6") إلى توقيت الرياض */
function toKSA(dateStr,timeStr){
  const [Y,Mo,D]=dateStr.split('-').map(Number);
  let hh=0,mm=0,off=0;
  if(timeStr){
    const m=timeStr.match(/(\d{1,2}):(\d{2})/); if(m){hh=+m[1];mm=+m[2];}
    const o=timeStr.match(/UTC([+-]\d{1,2})/i); if(o)off=+o[1];
  }
  // local = UTC + off  =>  UTC = local - off ; KSA = UTC + 3
  const utc=Date.UTC(Y,Mo-1,D,hh,mm)-off*3600000;
  const ms=utc+3*3600000;
  const d=new Date(ms);
  return {ms, epoch:utc,
    day:d.getUTCDate()+" "+MON[d.getUTCMonth()],
    dow:DOW[d.getUTCDay()],
    time:String((d.getUTCHours()%12)||12).padStart(2,'0')+":"+String(d.getUTCMinutes()).padStart(2,'0'),
    ap:d.getUTCHours()<12?"ص":"م"};
}
function stageOf(round,group){
  const r=norm(round);
  if(group||r.startsWith('matchday')||r.startsWith('group'))return["groups",(group||'').replace(/group/i,'').trim()||""];
  if(r.includes('third')||r.includes('3rd'))return["final","م. الثالث"];
  if(r.includes('round of 32')||r.includes('1/16'))return["r32","دور 32"];
  if(r.includes('round of 16')||r.includes('1/8'))return["r16","دور 16"];
  if(r.includes('quarter'))return["qf","ربع النهائي"];
  if(r.includes('semi'))return["sf","نصف النهائي"];
  if(r.includes('final'))return["final","النهائي"];
  return["r32",round||""];
}
function decode(x){ // يفك رموز الأدوار الإقصائية: 2A=ثاني A، W74=فائز 74، L101=خاسر 101
  const k=norm(x); if(NAME[k])return NAME[k][0];
  let m;
  if(m=x.match(/^1([A-L])$/i))return "أول "+m[1].toUpperCase();
  if(m=x.match(/^2([A-L])$/i))return "ثاني "+m[1].toUpperCase();
  if(m=x.match(/^3(.+)$/))return "ثالث "+m[1].toUpperCase();
  if(m=x.match(/^W(\d+)$/i))return "فائز "+m[1];
  if(m=x.match(/^L(\d+)$/i))return "خاسر "+m[1];
  return x;
}
function scoreOf(m){
  const pair=(a,b)=>(Number.isFinite(+a)&&Number.isFinite(+b))?[+a,+b]:null;
  const fromStr=s=>{const x=(s||'').toString().match(/(\d+)\s*[-:]\s*(\d+)/);return x?[+x[1],+x[2]]:null;};
  // 1) كائن النتيجة (الصيغة القياسية في openfootball): {ft:[2,1]} أو {ft:"2-1"}
  if(m.score){
    if(Array.isArray(m.score.ft)&&m.score.ft.length>=2)return pair(m.score.ft[0],m.score.ft[1]);
    if(typeof m.score.ft==='string'){const r=fromStr(m.score.ft);if(r)return r;}
    if(Array.isArray(m.score)&&m.score.length>=2)return pair(m.score[0],m.score[1]);
    if(typeof m.score==='string'){const r=fromStr(m.score);if(r)return r;}
  }
  // 2) حقول رقمية منفصلة
  const cand=[['score1','score2'],['goals1','goals2'],['team1_score','team2_score'],['ft1','ft2'],['homeScore','awayScore']];
  for(const[a,b]of cand){if(m[a]!=null&&m[b]!=null){const r=pair(m[a],m[b]);if(r)return r;}}
  // 3) حقول نصية مثل "2-1"
  for(const k of ['ft','result','fulltime']){if(typeof m[k]==='string'){const r=fromStr(m[k]);if(r)return r;}}
  return null;
}

function fromLive(json){
  const out=[];
  (json.matches||[]).forEach((m)=>{
    const k=toKSA(m.date,m.time);
    const [stage,grp]=stageOf(m.round,m.group);
    const c1=NAME[norm(m.team1)], c2=NAME[norm(m.team2)];
    let t1,t2,t1raw,t2raw;
    if(c1&&c2){ t1=arName(m.team1); t2=arName(m.team2); t1raw=norm(m.team1); t2raw=norm(m.team2); }
    else { t1=null; t2=[decode(m.team1)+" × "+decode(m.team2),""]; t1raw=null; t2raw=null; }
    out.push({order:k.ms,epoch:k.epoch,num:m.num||null,day:k.day,dow:k.dow,time:k.time,ap:k.ap,city:arCity(m.ground),
      stage, grp, t1, t2, t1raw, t2raw, score:scoreOf(m)});
  });
  out.sort((a,b)=>a.order-b.order);
  return out;
}

const WORKER_URL="https://worldcup-scores.vizyy33.workers.dev"; // رابط الووركر الخاص بك
function canonKey(a,b){
  const c=x=>NAME[norm(x)]?NAME[norm(x)][0]:norm(x);
  return [c(a),c(b)].sort().join('|');
}
const GOALS_CACHE_KEY="wc26-goals-cache-v1";
function matchCacheKey(m){
  if(!m||!m.t1raw||!m.t2raw)return null;
  return canonKey(m.t1raw,m.t2raw)+"@"+(m.epoch||m.day+"-"+m.time);
}
/* ===== نتائج مطبوعة دائمة (اختياري) =====
   عبّيها يدوياً لما تخلص أي مباراة، فتظهر للجميع فوراً وللأبد —
   حتى لو الووركر طاح أو انمسح كاشه. المفتاح: "بلد1|بلد2" بالإنجليزي المُطبّع.
   الترتيب لا يهم (الكود يطابق تلقائياً). مثال معبّأ ثم احذفه/استبدله:
*/
const RESULTS={
  // "mexico|south africa":{ft:[2,0],goals:[
  //   {side:"h",player:"Julián Quiñones",min:9},
  //   {side:"h",player:"Raúl Jiménez",min:67}
  // ]},
};
function applyPrintedResults(){
  // مفتاح إنجليزي مُطبّع غير مرتب: "mexico|south africa" — كما يكتبه المستخدم
  const enKey=(a,b)=>[norm(a),norm(b)].sort().join('|');
  const index={};
  Object.keys(RESULTS).forEach(k=>{
    const [x,y]=k.split('|');
    index[enKey(x,y)]={r:RESULTS[k],first:norm(x)};
  });
  DATA.forEach(m=>{
    if(!m.t1raw||!m.t2raw)return;
    const hit=index[enKey(m.t1raw,m.t2raw)];
    if(!hit)return;
    const r=hit.r;
    // اتجاه النتيجة: إذا أول اسم بالمفتاح ليس هو الفريق الأول في المباراة، اقلب
    const flip = hit.first!==norm(m.t1raw);
    if(r.ft && !m.score) m.score = flip?[r.ft[1],r.ft[0]]:r.ft.slice();
    if(r.ft) m.finished=true;
    if(r.goals && r.goals.length && !(m.goals&&m.goals.length)){
      m.goals=r.goals.map(g=>({
        side: flip?(g.side==='h'?'a':'h'):g.side,
        player:g.player, min:g.min||0, plus:g.plus||0, pen:!!g.pen, og:!!g.og
      })).sort((x,y)=>(x.min+x.plus/10)-(y.min+y.plus/10));
    }
  });
}
function readGoalsCache(){
  try{return JSON.parse(localStorage.getItem(GOALS_CACHE_KEY)||"{}");}
  catch(e){return {};}
}
function writeGoalsCache(cache){
  try{localStorage.setItem(GOALS_CACHE_KEY,JSON.stringify(cache));}
  catch(e){}
}
function applyGoalsCache(){
  const cache=readGoalsCache();
  DATA.forEach(m=>{
    const key=matchCacheKey(m); if(!key||!cache[key])return;
    const saved=cache[key];
    if(saved.score&&!m.score)m.score=saved.score;
    if(saved.finished)m.finished=true;
    if(saved.goals&&saved.goals.length&&!(m.goals&&m.goals.length))m.goals=saved.goals;
    if(saved.cards&&saved.cards.length&&!(m.cards&&m.cards.length))m.cards=saved.cards;
    if(saved.stats&&Object.keys(saved.stats).length&&!(m.stats&&Object.keys(m.stats).length))m.stats=saved.stats;
    if(saved.fixtureId&&!m.fixtureId)m.fixtureId=saved.fixtureId;
  });
}
function saveMatchGoals(m){
  const key=matchCacheKey(m); if(!key||(!m.score&&!(m.goals&&m.goals.length)&&!m.fixtureId))return;
  const cache=readGoalsCache();
  const prev=cache[key]||{};
  cache[key]={
    score:m.score||prev.score||null,
    finished:!!m.finished||!!prev.finished,
    goals:(m.goals&&m.goals.length)?m.goals:(prev.goals||[]),
    cards:(m.cards&&m.cards.length)?m.cards:(prev.cards||[]),
    stats:(m.stats&&Object.keys(m.stats).length)?m.stats:(prev.stats||null),
    fixtureId:m.fixtureId||prev.fixtureId||null,
    savedAt:Date.now()
  };
  writeGoalsCache(cache);
}
function preserveMatchState(prevData){
  const idx={};
  (prevData||[]).forEach(p=>{
    const key=matchCacheKey(p);
    if(key)idx[key]=p;
  });
  DATA.forEach(m=>{
    const old=idx[matchCacheKey(m)];
    if(!old)return;
    if(old.score&&!m.score)m.score=old.score;
    if(old.finished)m.finished=true;
    if(old.liveNow)m.liveNow=true;
    // ملاحظة: لا نحتفظ بالدقيقة القديمة (elapsed) — تُجلب طازجة من الووركر فقط حتى لا تتجمّد
    if(old.goals&&old.goals.length&&!(m.goals&&m.goals.length))m.goals=old.goals;
    if(old.cards&&old.cards.length&&!(m.cards&&m.cards.length))m.cards=old.cards;
    if(old.logo1&&!m.logo1)m.logo1=old.logo1;
    if(old.logo2&&!m.logo2)m.logo2=old.logo2;
  });
}
function mergeScores(j){
  if(!j||!j.scores)return;
  const idx={};
  j.scores.forEach(s=>{const k=canonKey(s.h,s.a);(idx[k]=idx[k]||[]).push(s);});
  DATA.forEach(m=>{
    if(!m.t1raw||!m.t2raw)return;
    const cands=idx[canonKey(m.t1raw,m.t2raw)];
    if(!cands)return;
    let best=null,bd=Infinity;
    cands.forEach(s=>{const d=Math.abs(s.ts*1000-(m.epoch||0));if(d<bd){bd=d;best=s;}});
    if(!best||bd>48*3600*1000)return; // نفس المواجهة خلال يومين من موعدها فقط
    const c=x=>NAME[norm(x)]?NAME[norm(x)][0]:norm(x);
    const flip = c(best.h)!==c(m.t1raw);
    if(best.ft) m.score = flip?[best.ft[1],best.ft[0]]:best.ft.slice();
    m.liveNow = best.status==='LIVE';
    m.finished = best.status==='FT';
    m.elapsed = best.elapsed||null;
    if(best.id) m.fixtureId = best.id;
    // شعارات الفرق الحقيقية (مع مراعاة قلب الاتجاه)
    if(best.hlogo||best.alogo){
      m.logo1 = flip ? (best.alogo||'') : (best.hlogo||'');
      m.logo2 = flip ? (best.hlogo||'') : (best.alogo||'');
      const arOf=x=>NAME[norm(x)]?NAME[norm(x)][0]:null;
      const aH=arOf(best.h), aA=arOf(best.a);
      if(aH && best.hlogo) LOGOS[aH]=best.hlogo;
      if(aA && best.alogo) LOGOS[aA]=best.alogo;
      saveLogos();
    }
    const ng=(best.goals||[]).map(g=>({
      side: flip ? (g.side==='h'?'a':'h') : g.side,
      player:g.player, min:g.min, plus:g.plus, pen:g.pen, og:g.og
    })).sort((x,y)=>(x.min+x.plus/10)-(y.min+y.plus/10));
    // لا تمسح المسجّلين المعروضين برد ناقص: تجاهل القائمة الفاضية لو عندنا قائمة فيها محتوى
    if(ng.length || !(m.goals&&m.goals.length)) m.goals=ng;
    const nc=(best.cards||[]).map(c=>({
      side: flip ? (c.side==='h'?'a':'h') : c.side,
      player:c.player, min:c.min, plus:c.plus, color:c.color
    })).sort((x,y)=>(x.min+x.plus/10)-(y.min+y.plus/10));
    if(nc.length || !(m.cards&&m.cards.length)) m.cards=nc;
    if(best.stats){
      if(flip){
        const fl={};Object.keys(best.stats).forEach(k=>{fl[k]={h:best.stats[k].a,a:best.stats[k].h};});
        m.stats=fl;
      } else m.stats=best.stats;
    }
    saveMatchGoals(m);
  });
  applyPrintedResults();
  render();
}

function getEliminated(){

// خارجو الدور الأول فقط (للجدول): الرابع في كل مجموعة + أسوأ ٤ مراكز ثالثة
function getGroupEliminated(){
  const elim=new Set();
  const S=buildStandings();
  const groups=Object.keys(S);
  const thirds=[];
  groups.forEach(g=>{
    const rows=S[g];
    // علّم فقط لما تلعب كل فرق المجموعة ٣ مباريات (انتهى الدور الأول لهذه المجموعة)
    if(rows.length>=4 && rows.every(t=>t.p>=3)){
      if(rows[3]) elim.add(norm(rows[3].key));   // الرابع: خارج دائماً
      if(rows[2]) thirds.push(rows[2]);          // الثالث: مرشّح (حسب أفضل ٨)
    }
  });
  // أفضل ٨ مراكز ثالثة يتأهلون؛ الباقي (أسوأ ٤) يخرجون — فقط لو اكتملت كل المجموعات الـ١٢
  if(groups.length>=12 && thirds.length>=12){
    thirds.sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf);
    thirds.slice(8).forEach(t=>elim.add(norm(t.key)));

  return elim;
}

function normAr(s){
  // تطبيع عربي: يوحّد الهمزات والألفات والياء والتاء المربوطة، ويشيل التشكيل
  return norm(s)
    .replace(/[\u0623\u0625\u0622\u0671]/g,'\u0627') // أ إ آ ٱ -> ا
    .replace(/\u0649/g,'\u064a')                     // ى -> ي
    .replace(/\u0629/g,'\u0647')                     // ة -> ه
    .replace(/\u0624/g,'\u0648')                     // ؤ -> و
    .replace(/\u0626/g,'\u064a')                     // ئ -> ي
    .replace(/\u0621/g,'')                           // ء تُحذف
    .replace(/[\u064B-\u0652\u0640]/g,'');           // تشكيل وتطويل
}
function matchHasQuery(m,q){
  if(!q)return true;
  q=normAr(q);
  // اجمع كل الأسماء الممكنة: الإنجليزي المُطبّع + العربي لكل فريق
  const parts=[];
  if(m.t1raw)parts.push(normAr(m.t1raw));
  if(m.t2raw)parts.push(normAr(m.t2raw));
  if(m.t1&&m.t1[0])parts.push(normAr(m.t1[0]));
  if(m.t2&&m.t2[0])parts.push(normAr(m.t2[0]));
  // للأدوار الإقصائية بدون فرق محددة، ابحث في النص المعروض
  if(!m.t1&&m.t2&&m.t2[0])parts.push(normAr(m.t2[0]));
  return parts.some(p=>p.includes(q));
}

      });
      // اعرض لو فيه إحصائيتان حقيقيتان على الأقل (الاستحواذ والتسديدات مثلاً)
      if(rows && realCount>=2){

      ${goalsHtml}

      ${statsBtn}

      ${lineupBtn}

  });
}

function teamKit(name,id){
  const k=KITS[(name||'').trim()];
  if(k)return {bg:k[0].replace(/\s/g,''),fg:k[1],border:k[2]||'rgba(255,255,255,.85)'};
  return {bg:'#00e0a4',fg:'#04221a',border:'rgba(255,255,255,.85)'}; // افتراضي
}
function hexToRgb(h){h=h.replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');const n=parseInt(h,16);return [n>>16&255,n>>8&255,n&255];}
function colorsClash(a,b){
  try{const [r1,g1,b1]=hexToRgb(a),[r2,g2,b2]=hexToRgb(b);
    const d=Math.sqrt((r1-r2)**2+(g1-g2)**2+(b1-b2)**2);return d<110;}catch(e){return false;}
}
function altKit(kit){
  // طقم احتياطي: لو الأساسي فاتح خذ داكن، والعكس
  const [r,g,b]=hexToRgb(kit.bg);const lum=(0.299*r+0.587*g+0.114*b);
  return lum>140 ? {bg:'#16213e',fg:'#fff',border:'rgba(255,255,255,.7)'} : {bg:'#f0f0f0',fg:'#111',border:'rgba(0,0,0,.3)'};
}

    const keys=Object.keys(c);if(keys.length>60){keys.sort((a,b)=>c[a].ts-c[b].ts).slice(0,keys.length-60).forEach(k=>delete c[k]);}

  }</div></div>`;
  };
  const pitchA=pitchPlayers(A,true,flag1,kitA);
  const pitchB=pitchPlayers(B,false,flag2,kitB);
  // هل فيه أي لاعب وصلته إحصائيات؟ (تحدد نوع التلميح)
  const hasAnyStats=(window.__PCREG||[]).length>0;
  const tip = hasAnyStats
    ? `<div class="lu-tip">👆 اضغط على أي لاعب <b>مميّز بنقطة خضراء</b> لعرض إحصائياته</div>`
    : `<div class="lu-tip nostats">ℹ️ إحصائيات اللاعبين غير متوفرة لهذه المباراة بعد — تظهر أثناء/بعد اللعب حسب توفّرها في المصدر.</div>`;
  const html=`
    ${tip}
    <div class="lu-head">
      <div class="lu-side"><span class="lu-team">${flag1} ${arA}</span><span class="lu-form">${A.formation||''}</span>${A.coach?`<span class="lu-coach">المدرب: ${A.coach}</span>`:''}</div>
      <div class="lu-side away"><span class="lu-team">${arB} ${flag2}</span><span class="lu-form">${B.formation||''}</span>${B.coach?`<span class="lu-coach">المدرب: ${B.coach}</span>`:''}</div>
    </div>
    ${bench(A,arA,'home')}
    <div class="pitch">
      <div class="goal top"></div><div class="box6 top"></div><div class="box top"></div>
      <div class="midline"></div><div class="circle"></div><div class="spot"></div>
      <div class="goal bot"></div><div class="box6 bot"></div><div class="box bot"></div>
      ${pitchA}${pitchB}
    </div>
    ${bench(B,arB,'away')}`;
  showLineupOverlay(html);
  // الأسماء تلتف تلقائياً لسطرين داخل عمود اللاعب (لا حاجة لتصغير قسري)
}
function openPlayerCard(idx){
  const reg=window.__PCREG||[];
  const p=reg[idx]; if(!p)return;
  const s=p.stats||{};
  const team=p.kit&&p.kit.bg?p.kit.bg:'#00e0a4';
  // اللون الثاني: مشتق من طقم الفريق إن وُجد، وإلا أخضر
  const team2='#0c7d40';
  const r=s.rating;
  const rateCls=r==null?'':(r>=7.5?'hi':(r>=6.5?'mid':'low'));
  const rateVal=r!=null?r.toFixed(1):'—';
  const posMap={G:'حارس',D:'مدافع',M:'وسط',F:'مهاجم'};
  const posAr=posMap[p.pos]||p.pos||'';
  const total=s.passes||0;
  // API يرجّع accuracy أحياناً كعدد تمريرات ناجحة (وليس نسبة). نحسب النسبة بأمان:
  let accPct=null, accCount=null;
  if(s.passAcc!=null){
    if(total>0 && s.passAcc<=total){ accCount=s.passAcc; accPct=Math.round(s.passAcc/total*100); }
    else { accPct=Math.round(s.passAcc); } // قيمة تبدو نسبة جاهزة
  }
  const bar=(v)=>Math.max(4,Math.min(100,v));
  const rows=[];
  if(accPct!=null) rows.push(['دقة التمرير', accPct+'%', bar(accPct)]);
  rows.push(['التمريرات', accCount!=null?`${accCount}/${total}`:String(total), bar(total/90*100)]);
  if(s.passKey) rows.push(['تمريرات مفتاحية', String(s.passKey), bar(s.passKey/5*100)]);
  if(s.dribbles||s.dribbleAtt) rows.push(['مراوغات ناجحة', String(s.dribbles||0), bar((s.dribbles||0)/8*100)]);
  if(s.tackles||s.interceptions) rows.push(['تدخلات/قطع', String((s.tackles||0)+(s.interceptions||0)), bar(((s.tackles||0)+(s.interceptions||0))/8*100)]);
  if(s.fouls) rows.push(['أخطاء', String(s.fouls), bar(s.fouls/6*100)]);
  const rowsHtml=rows.map(([k,v,w])=>`<div class="bc-row"><span class="rk">${k}</span><div class="rbar"><div class="rfill" style="width:${w}%"></div></div><span class="rv">${v}</span></div>`).join('');
  const html=`<div class="bc" style="--team:${team};--team2:${team2}">
    <div class="bc-bar">
      <div class="bc-numbox"><span class="bc-num">${p.num||''}</span></div>
      <div class="bc-who"><span class="bc-flag">${(LOGOS[p.teamAr]?`<img class="bclogo" src="${LOGOS[p.teamAr]}" onerror="this.replaceWith(document.createTextNode('${(p.flag||'').replace(/'/g,'')}'))">`:(p.flag||''))} ${p.teamAr||''}</span><span class="bc-name">${p.name||''}</span><span class="bc-pos">${posAr}${s.minutes?` · ${s.minutes} دقيقة`:''}</span></div>
      <div class="bc-rate ${rateCls}"><span class="rv">${rateVal}</span><span class="rl">RATING</span></div>
    </div>
    <div class="bc-key">
      <div class="cell"><div class="n g">${s.goals||0}</div><div class="l">أهداف</div></div>
      <div class="cell"><div class="n">${s.assists||0}</div><div class="l">صناعة</div></div>
      <div class="cell"><div class="n">${s.shots||0}</div><div class="l">تسديدات</div></div>
      <div class="cell"><div class="n">${s.shotsOn||0}</div><div class="l">على المرمى</div></div>
    </div>
    <div class="bc-rows">${rowsHtml||'<div class="bc-empty">لا توجد تفاصيل إضافية لهذا اللاعب</div>'}</div>
    <div class="bc-foot">WORLD CUP 2026 · إحصائيات المباراة</div>
  </div>`;
  let o=document.getElementById('pcOverlay');if(o)o.remove();
  o=document.createElement('div');o.id='pcOverlay';o.className='pcoverlay';
  o.innerHTML=`<div class="pcwrap"><button class="luclose" onclick="document.getElementById('pcOverlay').remove()">✕ إغلاق</button>${html}</div>`;
  o.addEventListener('click',e=>{if(e.target===o)o.remove();});
  document.body.appendChild(o);
}
function showLineupOverlay(inner){
  let o=document.getElementById('luOverlay');
  if(o)o.remove();
  o=document.createElement('div');o.id='luOverlay';o.className='luoverlay';
  o.innerHTML=`<div class="lubox"><button class="luclose" onclick="document.getElementById('luOverlay').remove()">✕ إغلاق</button>${inner}</div>`;
  o.addEventListener('click',e=>{if(e.target===o)o.remove();});
  document.body.appendChild(o);
}
async function loadLive(){
  setStatus('','جارٍ التحديث…');
  const urls=[
    "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json",
    "https://cdn.jsdelivr.net/gh/openfootball/worldcup.json@master/2026/worldcup.json"
  ];
  for(const u of urls){
    try{
      const r=await fetch(u,{cache:'no-store'}); if(!r.ok)continue;
      const j=await r.json(); const live=fromLive(j);
      if(live.length){const prevData=DATA;DATA=live;preserveMatchState(prevData);applyPrintedResults();applyGoalsCache();render();
        const now=new Date();const hh=String(now.getHours()).padStart(2,'0'),mm=String(now.getMinutes()).padStart(2,'0');
        setStatus('live',`محدّث مباشرة · ${hh}:${mm}`);return;}
    }catch(e){}
  }
  setStatus('err','تعذّر الاتصال — يُعرض الجدول المخزّن');
}

document.getElementById('frow').addEventListener('click',e=>{
  const b=e.target.closest('.chip');if(!b)return;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  b.classList.add('on');curFilter=b.dataset.f;
  // امسح البحث عند مغادرة تبويب "الكل" (مربع البحث يظهر فيه فقط)
  if(curFilter!=='all' && searchQuery){
    searchQuery='';
    const i=document.getElementById('searchInput');if(i)i.value='';
    const c=document.getElementById('searchClear');if(c)c.style.display='none';
  }
  render();
});
document.getElementById('refreshBtn').addEventListener('click',async()=>{
  const b=document.getElementById('refreshBtn');
  b.textContent='⏳ يحدّث…';b.disabled=true;
  // الاثنان بالتوازي: الجدول من openfootball + النتائج الحية من الووركر (لا ينتظر أحدهما الآخر)
  await Promise.allSettled([loadLive(), loadScores(true)]);
  b.textContent='↻ تحديث';b.disabled=false;
});

render();        // اعرض الاحتياطي فوراً
loadLive().then(()=>loadScores(true));   // ثم حدّث من المصدر + آخر النتائج (كسر الكاش)

// استطلاع تكيفي: كل ٢٠ ثانية وقت مباراة مباشرة، كل ٣ دقائق خارجها
function shouldBeLive(m){
  // المباراة يفترض أنها جارية لو مرّ موعد انطلاقها بأقل من ساعتين ونصف ولم تُحسم بعد
  return m.epoch && Date.now()>=m.epoch && Date.now() < m.epoch + 150*60*1000 && !m.finished;
}
function startingSoon(m){
  // على وشك البداية: موعدها خلال ٣ دقائق — نبدأ التحديث السريع قبل صافرة البداية
  return m.epoch && !m.finished && (m.epoch - Date.now()) > 0 && (m.epoch - Date.now()) < 3*60*1000;
}
function anyLiveNow(){
  return DATA.some(m => m.liveNow || shouldBeLive(m) || startingSoon(m));
}
function pollLoop(){
  const wait = anyLiveNow() ? 10*1000 : 60*1000;
  setTimeout(async ()=>{ await loadScores(); render(); pollLoop(); }, wait);
}
pollLoop();

// تحديث فوري على آخر البيانات كلما عادت الصفحة للظهور (رجوع من تطبيق آخر/تبويب آخر)
let _lastRefresh=Date.now();
async function refreshNow(){
  _lastRefresh=Date.now();
  await Promise.allSettled([loadLive(), loadScores(true)]);
  render();
}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible' && Date.now()-_lastRefresh>5000){ refreshNow(); }
});
window.addEventListener('pageshow',(e)=>{ if(e.persisted) refreshNow(); });
window.addEventListener('focus',()=>{ if(Date.now()-_lastRefresh>5000) refreshNow(); });
// أداة التثبيت: افتح الرابط بـ #export لاستخراج النتائج الدائمة
if(location.hash==='#export'){ loadLive().then(()=>loadScores(true)).then(()=>setTimeout(showExport,1500)); }

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').then(reg=>{
      // تحقّق من وجود تحديث فوراً
      reg.update();
      // لو وصل service worker جديد، فعّله وأعد التحميل مرة واحدة ليرى الزائر أحدث نسخة
      reg.addEventListener('updatefound',()=>{
        const nw=reg.installing;
        if(!nw)return;
        nw.addEventListener('statechange',()=>{
          if(nw.state==='installed' && navigator.serviceWorker.controller){
            nw.postMessage&&nw.postMessage('skip');
          }
        });
      });
    }).catch(()=>{});
    // عند تبديل الـ service worker المتحكم، أعد التحميل مرة واحدة فقط
    let reloaded=false;
    navigator.serviceWorker.addEventListener('controllerchange',()=>{
      if(reloaded)return; reloaded=true; location.reload();
    });
  });
}
window.addEventListener('scroll',()=>{
  const b=document.getElementById('toTop');if(b)b.classList.toggle('show',window.scrollY>400);
});
</script>
