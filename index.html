<style>

  }
  *{margin:0;padding:0;box-sizing:border-box}

  .dot.live{background:var(--accent);box-shadow:0 0 0 0 rgba(0,224,164,.5);animation:p 1.6s infinite}
  .dot.err{background:var(--accent2)}
  @keyframes p{0%{box-shadow:0 0 0 0 rgba(0,224,164,.5)}70%{box-shadow:0 0 0 8px rgba(0,224,164,0)}100%{box-shadow:0 0 0 0 rgba(0,224,164,0)}}

    padding:5px 12px;font-family:'Tajawal';font-weight:700;font-size:12px;cursor:pointer}
  .refresh:hover{color:var(--txt)}
  .filters{position:sticky;top:0;z-index:30;background:rgba(10,14,26,.86);backdrop-filter:blur(12px);

  .chip:hover{color:var(--txt)}
  .chip.on{background:linear-gradient(120deg,var(--accent),#00b389);color:#04221a;border-color:transparent}

  .dwords{font-weight:800;font-size:17px}.ddow{color:var(--mut);font-size:14px;font-weight:500}
  .match{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:10px;
    display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;transition:.18s;position:relative;overflow:hidden}
  .match:hover{background:var(--card-hi);transform:translateY(-2px)}
  .match.ksaM{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset,0 6px 24px rgba(255,203,69,.10)}
  .match.ksaM::before{content:"🇸🇦 السعودية";position:absolute;top:0;left:0;background:var(--gold);color:#3a2600;
    font-size:11px;font-weight:800;padding:3px 10px;border-bottom-right-radius:10px}
  .teams{display:flex;flex-direction:column;gap:7px;padding-top:2px}.match.ksaM .teams{padding-top:20px}.match.ksaM .meta{padding-top:20px}

  .team.win .sc{color:var(--gold)}

  .grpgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:12px}

  .note{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:0 0 20px;color:var(--mut);font-size:13.5px}

<script>
/* ===== خرائط الترجمة ===== */
const NAME={ // الاسم الإنجليزي (مُطبّع) -> [عربي, علم]
 "mexico":["المكسيك","🇲🇽"],"south africa":["جنوب أفريقيا","🇿🇦"],"south korea":["كوريا الجنوبية","🇰🇷"],"korea republic":["كوريا الجنوبية","🇰🇷"],
 "czechia":["التشيك","🇨🇿"],"czech republic":["التشيك","🇨🇿"],"canada":["كندا","🇨🇦"],"bosnia and herzegovina":["البوسنة والهرسك","🇧🇦"],"bosnia & herzegovina":["البوسنة والهرسك","🇧🇦"],
 "united states":["الولايات المتحدة","🇺🇸"],"usa":["الولايات المتحدة","🇺🇸"],"paraguay":["باراغواي","🇵🇾"],"qatar":["قطر","🇶🇦"],
 "switzerland":["سويسرا","🇨🇭"],"brazil":["البرازيل","🇧🇷"],"morocco":["المغرب","🇲🇦"],"haiti":["هايتي","🇭🇹"],"scotland":["اسكتلندا","🏴󠁧󠁢󠁳󠁣󠁴󠁿"],
 "australia":["أستراليا","🇦🇺"],"turkey":["تركيا","🇹🇷"],"türkiye":["تركيا","🇹🇷"],"turkiye":["تركيا","🇹🇷"],"germany":["ألمانيا","🇩🇪"],
 "curacao":["كوراساو","🇨🇼"],"curaçao":["كوراساو","🇨🇼"],"netherlands":["هولندا","🇳🇱"],"japan":["اليابان","🇯🇵"],
 "ivory coast":["ساحل العاج","🇨🇮"],"cote d'ivoire":["ساحل العاج","🇨🇮"],"côte d'ivoire":["ساحل العاج","🇨🇮"],"ecuador":["الإكوادور","🇪🇨"],
 "tunisia":["تونس","🇹🇳"],"sweden":["السويد","🇸🇪"],"spain":["إسبانيا","🇪🇸"],"cape verde":["الرأس الأخضر","🇨🇻"],"cabo verde":["الرأس الأخضر","🇨🇻"],
 "belgium":["بلجيكا","🇧🇪"],"egypt":["مصر","🇪🇬"],"saudi arabia":["السعودية","🇸🇦"],"uruguay":["أوروغواي","🇺🇾"],"iran":["إيران","🇮🇷"],"ir iran":["إيران","🇮🇷"],
 "new zealand":["نيوزيلندا","🇳🇿"],"france":["فرنسا","🇫🇷"],"senegal":["السنغال","🇸🇳"],"iraq":["العراق","🇮🇶"],"norway":["النرويج","🇳🇴"],
 "argentina":["الأرجنتين","🇦🇷"],"algeria":["الجزائر","🇩🇿"],"austria":["النمسا","🇦🇹"],"jordan":["الأردن","🇯🇴"],"portugal":["البرتغال","🇵🇹"],
 "congo dr":["الكونغو الديمقراطية","🇨🇩"],"dr congo":["الكونغو الديمقراطية","🇨🇩"],"congo dr (kinshasa)":["الكونغو الديمقراطية","🇨🇩"],
 "england":["إنجلترا","🏴󠁧󠁢󠁥󠁮󠁧󠁿"],"croatia":["كرواتيا","🇭🇷"],"ghana":["غانا","🇬🇭"],"panama":["بنما","🇵🇦"],"uzbekistan":["أوزبكستان","🇺🇿"],"colombia":["كولومبيا","🇨🇴"]
};
const CITY=[["mexico city","مدينة مكسيكو"],["guadalajara","غوادالاخارا"],["zapopan","غوادالاخارا"],["toronto","تورونتو"],
 ["los angeles","لوس أنجلوس"],["inglewood","لوس أنجلوس"],["san francisco","سان فرانسيسكو"],["santa clara","سان فرانسيسكو"],["bay","سان فرانسيسكو"],
 ["new york","نيويورك/نيوجيرسي"],["new jersey","نيويورك/نيوجيرسي"],["rutherford","نيويورك/نيوجيرسي"],["metlife","نيويورك/نيوجيرسي"],
 ["boston","بوسطن"],["foxborough","بوسطن"],["vancouver","فانكوفر"],["houston","هيوستن"],["dallas","دالاس"],["arlington","دالاس"],
 ["philadelphia","فيلادلفيا"],["monterrey","مونتيري"],["atlanta","أتلانتا"],["seattle","سياتل"],["miami","ميامي"],["kansas","كانساس سيتي"]];
const STAD={ // اسم الملعب حسب المدينة (بالعربي)
 "مدينة مكسيكو":"استاد مكسيكو سيتي (أزتيكا)","غوادالاخارا":"استاد أكرون","مونتيري":"استاد BBVA",
 "تورونتو":"بي إم أو فيلد","فانكوفر":"بي سي بليس","لوس أنجلوس":"استاد سوفاي","سان فرانسيسكو":"استاد ليڤايز",
 "سياتل":"لومن فيلد","نيويورك/نيوجيرسي":"استاد ميت لايف","بوسطن":"استاد جيليت","فيلادلفيا":"لينكولن فايننشال فيلد",
 "أتلانتا":"استاد مرسيدس-بنز","ميامي":"استاد هارد روك","هيوستن":"استاد NRG","دالاس":"استاد AT&T","كانساس سيتي":"استاد آرو هيد"};

function norm(s){return (s||"").toString().trim().toLowerCase().replace(/\s+/g,' ');}
function arName(en){const k=norm(en);if(NAME[k])return NAME[k];
  // ترجمة خفيفة لعناصر الأدوار الإقصائية
  let t=en.replace(/Winner Match/gi,'فائز م').replace(/Winner/gi,'فائز').replace(/Runners?-?up/gi,'وصيف')
        .replace(/Group/gi,'المجموعة').replace(/Match/gi,'م').replace(/3rd|Third/gi,'ثالث')
        .replace(/place/gi,'').replace(/\bvs\b/gi,'×');
  return [t,"🏳️"];}
function arCity(g){const k=norm(g);for(const[en,ar]of CITY)if(k.includes(en))return ar;return g||"";}

const MON=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
const DOW=["الأحد","الإثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];

/* يحوّل تاريخ+وقت openfootball (مثل 2026-06-11 و "13:00 UTC-6") إلى توقيت الرياض */
function toKSA(dateStr,timeStr){
  const [Y,Mo,D]=dateStr.split('-').map(Number);
  let hh=0,mm=0,off=0;
  if(timeStr){
    const m=timeStr.match(/(\d{1,2}):(\d{2})/); if(m){hh=+m[1];mm=+m[2];}
    const o=timeStr.match(/UTC([+-]\d{1,2})/i); if(o)off=+o[1];
  }
  // local = UTC + off  =>  UTC = local - off ; KSA = UTC + 3
  const utc=Date.UTC(Y,Mo-1,D,hh,mm)-off*3600000;
  const ms=utc+3*3600000;
  const d=new Date(ms);
  return {ms, epoch:utc,
    day:d.getUTCDate()+" "+MON[d.getUTCMonth()],
    dow:DOW[d.getUTCDay()],
    time:String((d.getUTCHours()%12)||12).padStart(2,'0')+":"+String(d.getUTCMinutes()).padStart(2,'0'),
    ap:d.getUTCHours()<12?"ص":"م"};
}
function stageOf(round,group){
  const r=norm(round);
  if(group||r.startsWith('matchday')||r.startsWith('group'))return["groups",(group||'').replace(/group/i,'').trim()||""];
  if(r.includes('third')||r.includes('3rd'))return["final","م. الثالث"];
  if(r.includes('round of 32')||r.includes('1/16'))return["r32","دور 32"];
  if(r.includes('round of 16')||r.includes('1/8'))return["r16","دور 16"];
  if(r.includes('quarter'))return["qf","ربع النهائي"];
  if(r.includes('semi'))return["sf","نصف النهائي"];
  if(r.includes('final'))return["final","النهائي"];
  return["r32",round||""];
}
function decode(x){ // يفك رموز الأدوار الإقصائية: 2A=ثاني A، W74=فائز 74، L101=خاسر 101
  const k=norm(x); if(NAME[k])return NAME[k][0];
  let m;

  if(m=x.match(/^3(.+)$/))return "ثالث "+m[1].toUpperCase();
  if(m=x.match(/^W(\d+)$/i))return "فائز "+m[1];

  return x;
}
function scoreOf(m){
  const pair=(a,b)=>(Number.isFinite(+a)&&Number.isFinite(+b))?[+a,+b]:null;
  const fromStr=s=>{const x=(s||'').toString().match(/(\d+)\s*[-:]\s*(\d+)/);return x?[+x[1],+x[2]]:null;};
  // 1) كائن النتيجة (الصيغة القياسية في openfootball): {ft:[2,1]} أو {ft:"2-1"}
  if(m.score){
    if(Array.isArray(m.score.ft)&&m.score.ft.length>=2)return pair(m.score.ft[0],m.score.ft[1]);
    if(typeof m.score.ft==='string'){const r=fromStr(m.score.ft);if(r)return r;}
    if(Array.isArray(m.score)&&m.score.length>=2)return pair(m.score[0],m.score[1]);
    if(typeof m.score==='string'){const r=fromStr(m.score);if(r)return r;}
  }
  // 2) حقول رقمية منفصلة
  const cand=[['score1','score2'],['goals1','goals2'],['team1_score','team2_score'],['ft1','ft2'],['homeScore','awayScore']];
  for(const[a,b]of cand){if(m[a]!=null&&m[b]!=null){const r=pair(m[a],m[b]);if(r)return r;}}
  // 3) حقول نصية مثل "2-1"
  for(const k of ['ft','result','fulltime']){if(typeof m[k]==='string'){const r=fromStr(m[k]);if(r)return r;}}
  return null;
}

const WORKER_URL="https://worldcup-scores.vizyy33.workers.dev"; // رابط الووركر الخاص بك
function canonKey(a,b){
  const c=x=>NAME[norm(x)]?NAME[norm(x)][0]:norm(x);
  return [c(a),c(b)].sort().join('|');
}
const GOALS_CACHE_KEY="wc26-goals-cache-v1";
function matchCacheKey(m){
  if(!m||!m.t1raw||!m.t2raw)return null;
  return canonKey(m.t1raw,m.t2raw)+"@"+(m.epoch||m.day+"-"+m.time);
}
function readGoalsCache(){
  try{return JSON.parse(localStorage.getItem(GOALS_CACHE_KEY)||"{}");}
  catch(e){return {};}
}
function writeGoalsCache(cache){
  try{localStorage.setItem(GOALS_CACHE_KEY,JSON.stringify(cache));}
  catch(e){}
}
function applyGoalsCache(){
  const cache=readGoalsCache();
  DATA.forEach(m=>{
    const key=matchCacheKey(m); if(!key||!cache[key])return;
    const saved=cache[key];
    if(saved.score&&!m.score)m.score=saved.score;
    if(saved.finished)m.finished=true;
    if(saved.goals&&saved.goals.length&&!(m.goals&&m.goals.length))m.goals=saved.goals;
  });
}
function saveMatchGoals(m){
  const key=matchCacheKey(m); if(!key||(!m.score&&!(m.goals&&m.goals.length)))return;
  const cache=readGoalsCache();
  const prev=cache[key]||{};
  cache[key]={
    score:m.score||prev.score||null,
    finished:!!m.finished||!!prev.finished,
    goals:(m.goals&&m.goals.length)?m.goals:(prev.goals||[]),
    savedAt:Date.now()
  };
  writeGoalsCache(cache);
}
function preserveMatchState(prevData){
  const idx={};
  (prevData||[]).forEach(p=>{
    const key=matchCacheKey(p);
    if(key)idx[key]=p;
  });
  DATA.forEach(m=>{
    const old=idx[matchCacheKey(m)];
    if(!old)return;
    if(old.score&&!m.score)m.score=old.score;
    if(old.finished)m.finished=true;
    if(old.liveNow)m.liveNow=true;
    if(old.elapsed&&!m.elapsed)m.elapsed=old.elapsed;
    if(old.goals&&old.goals.length&&!(m.goals&&m.goals.length))m.goals=old.goals;
  });
}
function mergeScores(j){
  if(!j||!j.scores)return;
  const idx={};
  j.scores.forEach(s=>{const k=canonKey(s.h,s.a);(idx[k]=idx[k]||[]).push(s);});
  DATA.forEach(m=>{
    if(!m.t1raw||!m.t2raw)return;
    const cands=idx[canonKey(m.t1raw,m.t2raw)];
    if(!cands)return;
    let best=null,bd=Infinity;
    cands.forEach(s=>{const d=Math.abs(s.ts*1000-(m.epoch||0));if(d<bd){bd=d;best=s;}});
    if(!best||bd>48*3600*1000)return; // نفس المواجهة خلال يومين من موعدها فقط
    const c=x=>NAME[norm(x)]?NAME[norm(x)][0]:norm(x);
    const flip = c(best.h)!==c(m.t1raw);
    if(best.ft) m.score = flip?[best.ft[1],best.ft[0]]:best.ft.slice();
    m.liveNow = best.status==='LIVE';
    m.finished = best.status==='FT';
    m.elapsed = best.elapsed||null;
    const ng=(best.goals||[]).map(g=>({
      side: flip ? (g.side==='h'?'a':'h') : g.side,
      player:g.player, min:g.min, plus:g.plus, pen:g.pen, og:g.og
    })).sort((x,y)=>(x.min+x.plus/10)-(y.min+y.plus/10));
    // لا تمسح المسجّلين المعروضين برد ناقص: تجاهل القائمة الفاضية لو عندنا قائمة فيها محتوى
    if(ng.length || !(m.goals&&m.goals.length)) m.goals=ng;
    saveMatchGoals(m);
  });
  render();
}
async function loadScores(){
  if(!WORKER_URL)return;
  try{
    const r=await fetch(WORKER_URL,{cache:'no-store'});
    if(r.ok){
      mergeScores(await r.json());
      const n=new Date(),hh=String(n.getHours()).padStart(2,'0'),mm=String(n.getMinutes()).padStart(2,'0');
      setStatus('live',`محدّث مباشرة · ${hh}:${mm}`);
    }
  }catch(e){}
}

    const g=m.grp; groups[g]=groups[g]||{};
    const ens=(k,nm)=>{if(!groups[g][k])groups[g][k]={key:k,name:nm[0],flag:nm[1],p:0,gf:0,ga:0,pts:0};return groups[g][k];};
    const A=ens(m.t1raw,m.t1),B=ens(m.t2raw,m.t2);
    if(m.score && !m.liveNow){const a=m.score[0],b=m.score[1];A.p++;B.p++;A.gf+=a;A.ga+=b;B.gf+=b;B.ga+=a;
      if(a>b)A.pts+=3;else if(b>a)B.pts+=3;else{A.pts++;B.pts++;}}
  });
  const out={};
  Object.keys(groups).sort().forEach(g=>{
    out[g]=Object.values(groups[g]).sort((x,y)=>y.pts-x.pts||(y.gf-y.ga)-(x.gf-x.ga)||y.gf-x.gf||x.name.localeCompare(y.name,'ar'));
  });
  return out;
}
function renderStandings(){
  const S=buildStandings(),keys=Object.keys(S);
  if(!keys.length){empty.style.display='block';return;}
  empty.style.display='none';
  const lg=document.createElement('div');lg.className='leg';
  lg.innerHTML='<span class="dotg"></span> أول منتخبين من كل مجموعة يتأهلون مباشرة، وأفضل ٨ مراكز ثالثة يلحقونهم لدور الـ٣٢.';
  list.appendChild(lg);
  const grid=document.createElement('div');grid.className='grpgrid';
  keys.forEach(g=>{
    let rows='';
    S[g].forEach((t,i)=>{const gd=t.gf-t.ga,gds=(gd>0?'+':'')+gd,ksa=t.key==='saudi arabia';
      rows+=`<tr class="${i<2?'adv':''} ${ksa?'ksaRow':''}"><td class="rk">${i+1}</td><td class="tm"><span class="flag">${t.flag}</span>${t.name}</td><td>${t.p}</td><td>${gds}</td><td class="pts">${t.pts}</td></tr>`;});
    const card=document.createElement('div');card.className='grpcard';
    card.innerHTML=`<div class="grphd">المجموعة ${g}</div><table class="grptbl"><thead><tr><th></th><th>المنتخب</th><th>لعب</th><th>+/-</th><th>نقاط</th></tr></thead><tbody>${rows}</tbody></table>`;
    grid.appendChild(card);
  });
  list.appendChild(grid);
}
function render(){
  list.innerHTML='';
  if(curFilter==='groups'){renderStandings();return;}
  const rows=DATA.filter(m=>{
    if(curFilter==='all')return true;
    if(curFilter==='ksa')return m.t1raw==='saudi arabia'||m.t2raw==='saudi arabia';
    return m.stage===curFilter;
  });
  if(!rows.length){empty.style.display='block';return}
  empty.style.display='none';
  let lastDay=null,dg=null;
  rows.forEach(m=>{
    if(m.day!==lastDay){
      dg=document.createElement('div');dg.className='daygroup';
      const p=m.day.split(' ');
      dg.innerHTML=`<div class="dayhead"><span class="dnum">${p[0]}</span><span class="dwords">${p[1]}</span><span class="ddow">${m.dow}</span></div>`;
      list.appendChild(dg);lastDay=m.day;
    }
    const isKsa=(m.t1raw==='saudi arabia'||m.t2raw==='saudi arabia');
    const st=ST[m.stage]||["k",""];
    const label=m.stage==='groups'?`${st[1]} ${m.grp}`:(m.grp||'النهائي');
    const sc=m.score;
    let teamsHtml;
    if(m.t1){
      teamsHtml=teamRow(m.t1,sc?sc[0]:null,sc&&sc[0]>sc[1])+`<div class="vs">×</div>`+teamRow(m.t2,sc?sc[1]:null,sc&&sc[1]>sc[0]);
    }else{
      const parts=m.t2[0].split(' × ');
      teamsHtml=`<div class="team" style="font-size:15px">${parts[0]}</div><div class="vs">×</div><div class="team" style="font-size:15px">${parts[1]||''}</div>`;
    }
    const el=document.createElement('div');el.className='match'+(isKsa?' ksaM':'');
    const stad=STAD[m.city]||'';
    const status = m.finished ? 'finished'
      : m.liveNow ? 'live'
      : sc ? 'finished'
      : ((m.epoch && Date.now()>=m.epoch) ? 'live' : 'upcoming');
    let metaTop;
    if(status==='finished') metaTop=`<div class="ft">انتهت</div>`;
    else if(status==='live') metaTop=`<div class="livep">● مباشر${m.elapsed?` ${m.elapsed}'`:' الآن'}</div>`;
    else metaTop=`<div><span class="time">${m.time}</span> <span class="ampm">${m.ap}</span></div><div class="ns">● لم تبدأ</div>`;
    let probHtml='';
    if(status==='upcoming' && m.t1 && m.t1raw && m.t2raw){
      const wp=winProb(m.t1raw,m.t2raw);
      if(wp) probHtml=`<div class="prob"><div class="pbar"><span class="pa" style="width:${wp[0]}%"></span><span class="pb" style="width:${wp[1]}%"></span></div><div class="plabels"><span class="va"><span class="pf">${m.t1[1]}</span>${wp[0]}%</span><span class="toq">توقع الفوز حسب ترتيب الفيفا</span><span class="vb">${wp[1]}%<span class="pf">${m.t2[1]}</span></span></div></div>`;
    }
    let goalsHtml='';
    if(m.goals && m.goals.length){
      const LIMIT=3;
      const row=(g,team)=>`<div class="grow ${g.side}"><span class="gflag">${team[1]||'⚽'}</span><span class="gname">${g.player}${g.pen?' (ج)':''}${g.og?' (خطأ)':''}</span><span class="gmin">${g.min}${g.plus?`+${g.plus}`:''}'</span></div>`;
      const col=(side,team)=>{
        const gs=m.goals.filter(g=>g.side===side);
        const shown=gs.slice(0,LIMIT).map(g=>row(g,team)).join('');
        const hidden=gs.slice(LIMIT).map(g=>row(g,team)).join('');
        const more=hidden?`<div class="gmorewrap" style="display:none">${hidden}</div><button class="gmore" onclick="this.previousElementSibling.style.display='block';this.remove()">+${gs.length-LIMIT} المزيد</button>`:'';
        return `<div class="gcol">${shown}${more}</div>`;
      };
      goalsHtml=`<div class="goals">${col('h',m.t1||['','⚽'])}${col('a',m.t2||['','⚽'])}</div>`;
    }
    el.innerHTML=`<div class="teams">${teamsHtml}</div>
      <div class="meta">${metaTop}
      ${stad?`<div class="stad">${stad}</div>`:''}
      <div class="city">${m.city}</div>
      <div class="tag ${st[0]}">${label}</div></div>
      ${goalsHtml}
      ${probHtml}`;
    dg.appendChild(el);
  });
}
function setStatus(state,txt){
  const d=document.getElementById('dot');d.className='dot'+(state?' '+state:'');
  document.getElementById('statusTxt').textContent=txt;
}
async function loadLive(){
  setStatus('','جارٍ التحديث…');
  const urls=[
    "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json",
    "https://cdn.jsdelivr.net/gh/openfootball/worldcup.json@master/2026/worldcup.json"
  ];
  for(const u of urls){
    try{
      const r=await fetch(u,{cache:'no-store'}); if(!r.ok)continue;
      const j=await r.json(); const live=fromLive(j);
      if(live.length){const prevData=DATA;DATA=live;preserveMatchState(prevData);applyGoalsCache();render();
        const now=new Date();const hh=String(now.getHours()).padStart(2,'0'),mm=String(now.getMinutes()).padStart(2,'0');
        setStatus('live',`محدّث مباشرة · ${hh}:${mm}`);return;}
    }catch(e){}
  }
  setStatus('err','تعذّر الاتصال — يُعرض الجدول المخزّن');
}

document.getElementById('frow').addEventListener('click',e=>{
  const b=e.target.closest('.chip');if(!b)return;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  b.classList.add('on');curFilter=b.dataset.f;render();
});
document.getElementById('refreshBtn').addEventListener('click',()=>loadLive().then(loadScores));

render();        // اعرض الاحتياطي فوراً
loadLive().then(loadScores);   // ثم حدّث من المصدر + النتائج اللحظية

// استطلاع تكيفي: كل ٢٠ ثانية وقت مباراة مباشرة، كل ٣ دقائق خارجها
function anyLiveNow(){
  return DATA.some(m => m.liveNow || (!m.finished && !m.score && m.epoch && Date.now()>=m.epoch && Date.now() < m.epoch + 3*3600*1000));
}
function pollLoop(){
  const wait = anyLiveNow() ? 20*1000 : 3*60*1000;
  setTimeout(async ()=>{ await loadScores(); pollLoop(); }, wait);
}
pollLoop();
</script>
